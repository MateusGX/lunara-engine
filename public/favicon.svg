<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" fill="#0d0a1a"/>
  <!-- Border -->
  <rect x="0.5" y="0.5" width="31" height="31" fill="none" stroke="#3b1d6e" stroke-width="1"/>

  <!-- Pixel art — same 6×7 glyph as the logo icon, scaled 4×, centered -->
  <!-- Row 0: cols 1-2 -->
  <rect x="8"  y="2"  width="8" height="4" fill="#8b5cf6"/>
  <!-- Row 1: cols 0-1 -->
  <rect x="4"  y="6"  width="8" height="4" fill="#8b5cf6"/>
  <!-- Row 2: col 0 -->
  <rect x="4"  y="10" width="4" height="4" fill="#8b5cf6"/>
  <!-- Row 3: col 0 -->
  <rect x="4"  y="14" width="4" height="4" fill="#8b5cf6"/>
  <!-- Row 4: col 0 -->
  <rect x="4"  y="18" width="4" height="4" fill="#8b5cf6"/>
  <!-- Row 5: cols 0-1 -->
  <rect x="4"  y="22" width="8" height="4" fill="#8b5cf6"/>
  <!-- Row 6: cols 1-2 -->
  <rect x="8"  y="26" width="8" height="4" fill="#8b5cf6"/>

  <!-- Accent dot (bottom-right corner) -->
  <rect x="28" y="28" width="4" height="4" fill="#7c3aed"/>
</svg>
